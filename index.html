<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cartão da Família</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #16151A; }
  input, select, button { font-family: inherit; }
  input:focus, select:focus { outline: none; border-color: #C2A878 !important; }
  button:focus-visible { outline: 2px solid #C2A878; outline-offset: 2px; }
  ::placeholder { color: #6A665E; }
  select option { background: #1F1E24; color: #EDEAE3; }
  @media (max-width: 560px) { .cards-grid { grid-template-columns: repeat(2, 1fr) !important; } }
  .spin { animation: sp 0.8s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
// ============ Firebase ============
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUJowqYLXBn0zIx_PdPkBIw_tgiMZuIQg",
  authDomain: "cartao-familia-d8deb.firebaseapp.com",
  projectId: "cartao-familia-d8deb",
  storageBucket: "cartao-familia-d8deb.firebasestorage.app",
  messagingSenderId: "724854290273",
  appId: "1:724854290273:web:649c4f27b32113ff0cf720",
  measurementId: "G-EBZRTXYVES"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Coleções (nomes únicos deste app, no padrão Identity Lock)
const COL_PESSOAS = "cf_pessoas";
const COL_LANC = "cf_lancamentos";

// Expõe helpers para o restante do código (fora do módulo)
window.__fb = {
  db, collection, doc, onSnapshot, setDoc, deleteDoc, writeBatch,
  COL_PESSOAS, COL_LANC
};
window.dispatchEvent(new Event("fb-ready"));
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ============ Paleta ============
const C = {
  bg: "#16151A", panel: "#1F1E24", panel2: "#26242C", line: "#34323C",
  text: "#EDEAE3", dim: "#9A968E", faint: "#6A665E",
  credit: "#5FB58A", debit: "#E0A04B", alert: "#D9694B", accent: "#C2A878",
};
const BRL = (n) => (n || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
const hoje = () => new Date().toISOString().slice(0, 10);
const mesAtual = () => new Date().toISOString().slice(0, 7);
const fmtData = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("pt-BR") : "";
const NOMES_MES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const NOMES_MES_LONGO = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const fmtMes = (m) => { if (!m) return ""; const [a, mm] = m.split("-"); return `${NOMES_MES[+mm - 1]}/${a}`; };
const fmtMesLongo = (m) => { if (!m) return ""; const [a, mm] = m.split("-"); return `${NOMES_MES_LONGO[+mm - 1]} de ${a}`; };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

// ============ Camada Firestore ============
function useFirestore() {
  const [pronto, setPronto] = useState(!!window.__fb);
  const [pessoas, setPessoas] = useState([]);
  const [lancamentos, setLancamentos] = useState([]);
  const [erro, setErro] = useState(null);
  const [online, setOnline] = useState(false);

  useEffect(() => {
    if (window.__fb) { setPronto(true); return; }
    const h = () => setPronto(true);
    window.addEventListener("fb-ready", h);
    return () => window.removeEventListener("fb-ready", h);
  }, []);

  useEffect(() => {
    if (!pronto) return;
    const fb = window.__fb;
    try {
      const un1 = fb.onSnapshot(fb.collection(fb.db, fb.COL_PESSOAS),
        (snap) => { setPessoas(snap.docs.map((d) => d.data())); setOnline(true); },
        (e) => setErro(e.message));
      const un2 = fb.onSnapshot(fb.collection(fb.db, fb.COL_LANC),
        (snap) => { setLancamentos(snap.docs.map((d) => d.data())); setOnline(true); },
        (e) => setErro(e.message));
      return () => { un1(); un2(); };
    } catch (e) { setErro(e.message); }
  }, [pronto]);

  const api = useMemo(() => {
    const fb = () => window.__fb;
    return {
      salvarPessoa: (p) => fb().setDoc(fb().doc(fb().db, fb().COL_PESSOAS, p.id), p),
      removerPessoa: async (id) => {
        const f = fb();
        await f.deleteDoc(f.doc(f.db, f.COL_PESSOAS, id));
        const lancs = (window.__lancRef || []).filter((l) => l.pessoaId === id);
        const batch = f.writeBatch(f.db);
        lancs.forEach((l) => batch.delete(f.doc(f.db, f.COL_LANC, l.id)));
        await batch.commit();
      },
      salvarLanc: (l) => fb().setDoc(fb().doc(fb().db, fb().COL_LANC, l.id), l),
      salvarLancs: async (arr) => {
        const f = fb(); const batch = f.writeBatch(f.db);
        arr.forEach((l) => batch.set(f.doc(f.db, f.COL_LANC, l.id), l));
        await batch.commit();
      },
      removerLanc: (id) => fb().deleteDoc(fb().doc(fb().db, fb().COL_LANC, id)),
    };
  }, []);

  useEffect(() => { window.__lancRef = lancamentos; }, [lancamentos]);

  return { pronto, online, pessoas, lancamentos, erro, api };
}

// ============ App ============
function App() {
  const { pronto, online, pessoas, lancamentos, erro, api } = useFirestore();
  const [aba, setAba] = useState("resumo");
  const [pessoaSel, setPessoaSel] = useState(null);
  const [modal, setModal] = useState(null);
  const [mesFiltro, setMesFiltro] = useState("todos");

  const saldoDe = (pid) =>
    lancamentos.filter((l) => l.pessoaId === pid)
      .reduce((s, l) => s + (l.tipo === "pagamento" ? -l.valor : l.valor), 0);
  const ultimoPagamento = (pid) => {
    const ps = lancamentos.filter((l) => l.pessoaId === pid && l.tipo === "pagamento")
      .sort((a, b) => b.data.localeCompare(a.data));
    return ps[0]?.data || null;
  };
  const diasSemPagar = (pid) => {
    if (saldoDe(pid) <= 0.005) return null;
    const up = ultimoPagamento(pid);
    const primeira = lancamentos.filter((l) => l.pessoaId === pid && l.tipo !== "pagamento")
      .sort((a, b) => a.data.localeCompare(b.data))[0]?.data;
    const ref = up || primeira;
    if (!ref) return null;
    return Math.floor((Date.now() - new Date(ref + "T00:00:00")) / 86400000);
  };
  const mesesDisponiveis = useMemo(() => {
    const set = new Set(lancamentos.map((l) => l.mes));
    return [...set].sort((a, b) => b.localeCompare(a));
  }, [lancamentos]);
  const totais = useMemo(() => {
    const devido = pessoas.reduce((s, p) => s + Math.max(0, saldoDe(p.id)), 0);
    const ehMes = (l) => mesFiltro === "todos" ? l.mes === mesAtual() : l.mes === mesFiltro;
    const recebido = lancamentos.filter((l) => l.tipo === "pagamento" && ehMes(l)).reduce((s, l) => s + l.valor, 0);
    const gasto = lancamentos.filter((l) => l.tipo !== "pagamento" && ehMes(l)).reduce((s, l) => s + l.valor, 0);
    const atrasados = pessoas.filter((p) => { const d = diasSemPagar(p.id); return d !== null && d > (p.prazo || 30); }).length;
    return { devido, recebido, gasto, atrasados };
  }, [pessoas, lancamentos, mesFiltro]);
  const rotuloMes = mesFiltro === "todos" ? fmtMes(mesAtual()) : fmtMes(mesFiltro);

  // Ações
  const addPessoa = (nome, prazo) => {
    const id = uid(); api.salvarPessoa({ id, nome, prazo: prazo || 30 }); return id;
  };
  const removerPessoa = (id) => {
    api.removerPessoa(id);
    if (pessoaSel === id) { setPessoaSel(null); setAba("resumo"); }
  };
  const addLancamento = (dados) => {
    if (dados.tipo === "compra" && dados.parcelas > 1) {
      const grupo = uid(); const valorParc = +(dados.valor / dados.parcelas).toFixed(2);
      const linhas = []; const base = new Date(dados.data + "T00:00:00");
      for (let i = 0; i < dados.parcelas; i++) {
        const d = new Date(base); d.setMonth(d.getMonth() + i);
        const ds = d.toISOString().slice(0, 10);
        linhas.push({ id: uid(), pessoaId: dados.pessoaId, tipo: "compra",
          categoria: dados.categoria, desc: dados.desc, valor: valorParc,
          data: ds, mes: ds.slice(0, 7), parcela: i + 1, parcelas: dados.parcelas, grupo });
      }
      api.salvarLancs(linhas);
    } else {
      api.salvarLanc({ id: uid(), mes: dados.data.slice(0, 7), parcela: 1, parcelas: 1, ...dados });
    }
    setModal(null);
  };
  const removerLancamento = (id) => api.removerLanc(id);

  if (!pronto) return <TelaCarregando texto="Conectando ao Firebase…" />;
  if (erro) return <TelaErro msg={erro} />;

  return (
    <div style={sx.app}>
      <header style={sx.header}>
        <div>
          <div style={sx.brandRow}>
            <span style={sx.brandMark}>◷</span>
            <h1 style={sx.brand}>Cartão da Família</h1>
            <span style={{ ...sx.dot, background: online ? C.credit : C.faint }} title={online ? "Sincronizado" : "Conectando…"} />
          </div>
          <p style={sx.sub}>Controle de quem usou e quanto já devolveu</p>
        </div>
        <button style={sx.addBtn} onClick={() => setModal({ kind: "lanc", tipo: "compra" })}>+ Lançar</button>
      </header>

      <nav style={sx.nav}>
        {[["resumo","Resumo"],["pessoas","Responsáveis"],["historico","Histórico"]].map(([k, label]) => (
          <button key={k} onClick={() => { setAba(k); setPessoaSel(null); }}
            style={{ ...sx.navBtn, ...(aba === k ? sx.navBtnActive : {}) }}>{label}</button>
        ))}
      </nav>

      <main style={sx.main}>
        {aba === "resumo" && (
          <Resumo totais={totais} pessoas={pessoas} saldoDe={saldoDe} diasSemPagar={diasSemPagar}
            rotuloMes={rotuloMes} mesFiltro={mesFiltro} setMesFiltro={setMesFiltro} mesesDisponiveis={mesesDisponiveis}
            onAbrir={(id) => { setPessoaSel(id); setAba("pessoas"); }}
            onNovo={() => setModal({ kind: "lanc", tipo: "compra" })}
            onCobrar={(p) => setModal({ kind: "cobranca", pessoa: p })} />
        )}
        {aba === "pessoas" && !pessoaSel && (
          <ListaPessoas pessoas={pessoas} saldoDe={saldoDe} diasSemPagar={diasSemPagar}
            onAbrir={setPessoaSel} onAdd={() => setModal({ kind: "pessoa" })} />
        )}
        {aba === "pessoas" && pessoaSel && (
          <DetalhePessoa pessoa={pessoas.find((p) => p.id === pessoaSel)}
            lancamentos={lancamentos.filter((l) => l.pessoaId === pessoaSel)}
            saldo={saldoDe(pessoaSel)} dias={diasSemPagar(pessoaSel)}
            onVoltar={() => setPessoaSel(null)}
            onPagar={() => setModal({ kind: "lanc", tipo: "pagamento", pessoaId: pessoaSel })}
            onCompra={() => setModal({ kind: "lanc", tipo: "compra", pessoaId: pessoaSel })}
            onFatura={() => setModal({ kind: "lanc", tipo: "fatura", pessoaId: pessoaSel })}
            onCobrar={() => setModal({ kind: "cobranca", pessoa: pessoas.find((p) => p.id === pessoaSel) })}
            onRemoverLanc={removerLancamento}
            onRemoverPessoa={() => setModal({ kind: "confirmDel", pessoaId: pessoaSel })} />
        )}
        {aba === "historico" && (
          <Historico lancamentos={lancamentos} pessoas={pessoas} onRemover={removerLancamento} mesesDisponiveis={mesesDisponiveis} />
        )}
      </main>

      {modal?.kind === "pessoa" && <ModalPessoa onClose={() => setModal(null)} onSave={addPessoa} />}
      {modal?.kind === "lanc" && (
        <ModalLancamento tipoInicial={modal.tipo} pessoaIdFixo={modal.pessoaId} pessoas={pessoas}
          onClose={() => setModal(null)} onSave={addLancamento} onAddPessoa={addPessoa} />
      )}
      {modal?.kind === "confirmDel" && (
        <ModalConfirm texto="Remover este responsável apaga também todos os lançamentos dele. Continuar?"
          onClose={() => setModal(null)} onConfirm={() => { removerPessoa(modal.pessoaId); setModal(null); }} />
      )}
      {modal?.kind === "cobranca" && (
        <ModalCobranca pessoa={modal.pessoa} saldo={saldoDe(modal.pessoa.id)}
          lancamentos={lancamentos.filter((l) => l.pessoaId === modal.pessoa.id)}
          dias={diasSemPagar(modal.pessoa.id)} onClose={() => setModal(null)} />
      )}
    </div>
  );
}

function TelaCarregando({ texto }) {
  return (
    <div style={{ ...sx.app, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", flexDirection: "column", gap: 16 }}>
      <div className="spin" style={{ width: 34, height: 34, border: `3px solid ${C.line}`, borderTopColor: C.accent, borderRadius: "50%" }} />
      <span style={{ color: C.dim, fontSize: 14 }}>{texto}</span>
    </div>
  );
}
function TelaErro({ msg }) {
  return (
    <div style={{ ...sx.app, padding: 30 }}>
      <h2 style={{ color: C.alert }}>Erro de conexão</h2>
      <p style={{ color: C.dim, fontSize: 14, lineHeight: 1.6 }}>
        Não consegui falar com o Firestore. Verifique se você ativou o Firestore Database no console e se as regras estão publicadas.
      </p>
      <pre style={{ background: C.panel, padding: 12, borderRadius: 8, color: C.faint, fontSize: 12, overflowX: "auto" }}>{msg}</pre>
    </div>
  );
}

// ============ Seletor de mês ============
function SeletorMes({ mesFiltro, setMesFiltro, meses }) {
  return (
    <select style={sx.mesSelect} value={mesFiltro} onChange={(e) => setMesFiltro(e.target.value)}>
      <option value="todos">Mês atual ({fmtMes(mesAtual())})</option>
      {meses.map((m) => <option key={m} value={m}>{fmtMesLongo(m)}</option>)}
    </select>
  );
}

// ============ Resumo ============
function Resumo({ totais, pessoas, saldoDe, diasSemPagar, rotuloMes, mesFiltro, setMesFiltro, mesesDisponiveis, onAbrir, onNovo, onCobrar }) {
  const devedores = pessoas.map((p) => ({ ...p, saldo: saldoDe(p.id), dias: diasSemPagar(p.id) }))
    .filter((p) => p.saldo > 0.005).sort((a, b) => b.saldo - a.saldo);
  const atrasados = devedores.filter((p) => p.dias !== null && p.dias > (p.prazo || 30));
  if (pessoas.length === 0)
    return <Vazio titulo="Comece cadastrando quem usa o cartão"
      texto="Adicione cada familiar como responsável e registre as compras e os pagamentos que eles devolvem."
      acao="Lançar primeira compra" onAcao={onNovo} />;
  return (
    <>
      <div style={sx.mesBar}>
        <span style={sx.mesBarLabel}>Mostrando</span>
        <SeletorMes mesFiltro={mesFiltro} setMesFiltro={setMesFiltro} meses={mesesDisponiveis} />
      </div>
      <section className="cards-grid" style={sx.cards}>
        <Card rotulo="Total a receber (geral)" valor={BRL(totais.devido)} cor={C.debit} destaque />
        <Card rotulo={`Recebido em ${rotuloMes}`} valor={BRL(totais.recebido)} cor={C.credit} />
        <Card rotulo={`Gasto em ${rotuloMes}`} valor={BRL(totais.gasto)} cor={C.text} />
        <Card rotulo="Em atraso" valor={String(totais.atrasados)} cor={totais.atrasados ? C.alert : C.dim} />
      </section>
      {atrasados.length > 0 && (
        <section style={sx.block}>
          <h2 style={sx.h2}><span style={{ color: C.alert }}>●</span> Atrasados</h2>
          <div style={sx.rows}>
            {atrasados.map((p) => (
              <div key={p.id} style={{ ...sx.row, ...sx.rowAlert }}>
                <button style={sx.rowMain} onClick={() => onAbrir(p.id)}>
                  <div>
                    <div style={sx.rowName}>{p.nome}</div>
                    <div style={{ ...sx.rowMeta, color: C.alert }}>{p.dias} dias sem pagar · prazo {p.prazo || 30}d</div>
                  </div>
                  <div style={{ ...sx.rowVal, color: C.alert }}>{BRL(p.saldo)}</div>
                </button>
                <button style={sx.zapBtn} title="Gerar cobrança WhatsApp" onClick={() => onCobrar(p)}>Cobrar</button>
              </div>
            ))}
          </div>
        </section>
      )}
      <section style={sx.block}>
        <h2 style={sx.h2}>Quem ainda deve</h2>
        {devedores.length === 0 ? (
          <p style={sx.empty}>Ninguém com saldo em aberto. Tudo quitado.</p>
        ) : (
          <div style={sx.rows}>
            {devedores.map((p) => (
              <div key={p.id} style={sx.row}>
                <button style={sx.rowMain} onClick={() => onAbrir(p.id)}>
                  <div>
                    <div style={sx.rowName}>{p.nome}</div>
                    <div style={sx.rowMeta}>{p.dias !== null ? `${p.dias} dias desde último pagamento` : "—"}</div>
                  </div>
                  <div style={{ ...sx.rowVal, color: C.debit }}>{BRL(p.saldo)}</div>
                </button>
                <button style={sx.zapBtn} title="Gerar cobrança WhatsApp" onClick={() => onCobrar(p)}>Cobrar</button>
              </div>
            ))}
          </div>
        )}
      </section>
    </>
  );
}

// ============ Lista de pessoas ============
function ListaPessoas({ pessoas, saldoDe, diasSemPagar, onAbrir, onAdd }) {
  return (
    <>
      <div style={sx.listHead}>
        <h2 style={sx.h2}>Responsáveis</h2>
        <button style={sx.ghostBtn} onClick={onAdd}>+ Adicionar</button>
      </div>
      {pessoas.length === 0 ? (
        <Vazio titulo="Nenhum responsável ainda" texto="Cadastre cada familiar que usa o cartão." acao="Adicionar responsável" onAcao={onAdd} />
      ) : (
        <div style={sx.rows}>
          {pessoas.map((p) => {
            const saldo = saldoDe(p.id); const dias = diasSemPagar(p.id);
            const atrasado = dias !== null && dias > (p.prazo || 30);
            return (
              <button key={p.id} style={sx.rowBtn} onClick={() => onAbrir(p.id)}>
                <div>
                  <div style={sx.rowName}>{p.nome}</div>
                  <div style={{ ...sx.rowMeta, color: atrasado ? C.alert : C.dim }}>
                    {saldo > 0.005 ? (atrasado ? `Atrasado · ${dias}d` : "Em aberto") : "Quitado"}
                  </div>
                </div>
                <div style={{ ...sx.rowVal, color: saldo > 0.005 ? C.debit : C.credit }}>{BRL(saldo)}</div>
              </button>
            );
          })}
        </div>
      )}
    </>
  );
}

// ============ Detalhe ============
function DetalhePessoa({ pessoa, lancamentos, saldo, dias, onVoltar, onPagar, onCompra, onFatura, onCobrar, onRemoverLanc, onRemoverPessoa }) {
  if (!pessoa) return null;
  const ordenados = [...lancamentos].sort((a, b) => b.data.localeCompare(a.data) || b.id.localeCompare(a.id));
  const atrasado = dias !== null && dias > (pessoa.prazo || 30);
  return (
    <>
      <button style={sx.back} onClick={onVoltar}>‹ Responsáveis</button>
      <div style={sx.detHeader}>
        <div>
          <h2 style={sx.detName}>{pessoa.nome}</h2>
          <span style={sx.detPrazo}>Prazo de pagamento: {pessoa.prazo || 30} dias</span>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={sx.detLabel}>{saldo > 0.005 ? "Deve" : "Saldo"}</div>
          <div style={{ ...sx.detSaldo, color: saldo > 0.005 ? C.debit : C.credit }}>{BRL(saldo)}</div>
          {atrasado && <div style={{ color: C.alert, fontSize: 12, marginTop: 2 }}>● {dias} dias sem pagar</div>}
        </div>
      </div>
      <div style={sx.actionRow}>
        <button style={{ ...sx.actBtn, borderColor: C.credit, color: C.credit }} onClick={onPagar}>Registrar pagamento</button>
        <button style={sx.actBtn} onClick={onCompra}>Nova compra</button>
        <button style={sx.actBtn} onClick={onFatura}>Fatura do mês</button>
      </div>
      {saldo > 0.005 && <button style={sx.cobrarFull} onClick={onCobrar}>📲 Gerar cobrança para WhatsApp</button>}
      <div style={sx.rows}>
        {ordenados.length === 0 && <p style={sx.empty}>Nenhum lançamento para {pessoa.nome} ainda.</p>}
        {ordenados.map((l) => <LinhaLanc key={l.id} l={l} onRemover={() => onRemoverLanc(l.id)} />)}
      </div>
      <button style={sx.delPessoa} onClick={onRemoverPessoa}>Remover responsável</button>
    </>
  );
}

function LinhaLanc({ l, onRemover, mostrarPessoa }) {
  const pag = l.tipo === "pagamento";
  const rotulo = pag ? "Pagamento" : l.tipo === "fatura" ? "Fatura" : "Compra";
  const cor = pag ? C.credit : l.tipo === "fatura" ? C.accent : C.debit;
  return (
    <div style={sx.lancRow}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={sx.lancTop}>
          <span style={{ ...sx.tag, color: cor, borderColor: pag ? C.credit : l.tipo === "fatura" ? C.accent : C.line }}>{rotulo}</span>
          {mostrarPessoa && <span style={sx.lancPessoa}>{mostrarPessoa}</span>}
          {l.parcelas > 1 && <span style={sx.parc}>{l.parcela}/{l.parcelas}</span>}
        </div>
        <div style={sx.lancDesc}>{l.desc || l.categoria || "—"}</div>
        <div style={sx.lancData}>{fmtData(l.data)}{l.categoria && l.desc ? ` · ${l.categoria}` : ""}</div>
      </div>
      <div style={{ textAlign: "right", display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ ...sx.lancVal, color: pag ? C.credit : C.debit }}>{pag ? "−" : "+"}{BRL(l.valor)}</span>
        <button style={sx.xBtn} onClick={onRemover} title="Remover">×</button>
      </div>
    </div>
  );
}

// ============ Histórico ============
function Historico({ lancamentos, pessoas, onRemover, mesesDisponiveis }) {
  const [filtro, setFiltro] = useState("todos");
  const [mes, setMes] = useState("todos");
  const nome = (id) => pessoas.find((p) => p.id === id)?.nome || "—";
  const lista = lancamentos
    .filter((l) => filtro === "todos" || l.tipo === filtro || (filtro === "compra" && l.tipo === "fatura"))
    .filter((l) => mes === "todos" || l.mes === mes)
    .sort((a, b) => b.data.localeCompare(a.data) || b.id.localeCompare(a.id));
  return (
    <>
      <div style={sx.filtros}>
        {[["todos","Tudo"],["compra","Compras"],["pagamento","Pagamentos"]].map(([k, l]) => (
          <button key={k} onClick={() => setFiltro(k)} style={{ ...sx.chip, ...(filtro === k ? sx.chipOn : {}) }}>{l}</button>
        ))}
      </div>
      <select style={{ ...sx.mesSelect, width: "100%", marginBottom: 16 }} value={mes} onChange={(e) => setMes(e.target.value)}>
        <option value="todos">Todos os meses</option>
        {mesesDisponiveis.map((m) => <option key={m} value={m}>{fmtMesLongo(m)}</option>)}
      </select>
      {lista.length === 0 ? <p style={sx.empty}>Nada por aqui ainda.</p> : (
        <div style={sx.rows}>
          {lista.map((l) => <LinhaLanc key={l.id} l={l} mostrarPessoa={nome(l.pessoaId)} onRemover={() => onRemover(l.id)} />)}
        </div>
      )}
    </>
  );
}

// ============ Auxiliares ============
function Card({ rotulo, valor, cor, destaque }) {
  return (
    <div style={{ ...sx.card, ...(destaque ? sx.cardHi : {}) }}>
      <div style={sx.cardLabel}>{rotulo}</div>
      <div style={{ ...sx.cardVal, color: cor }}>{valor}</div>
    </div>
  );
}
function Vazio({ titulo, texto, acao, onAcao }) {
  return (
    <div style={sx.vazio}>
      <div style={sx.vazioMark}>◷</div>
      <h3 style={sx.vazioTit}>{titulo}</h3>
      <p style={sx.vazioTxt}>{texto}</p>
      {acao && <button style={sx.addBtn} onClick={onAcao}>{acao}</button>}
    </div>
  );
}

// ============ Modais ============
function Overlay({ children, onClose }) {
  return (
    <div style={sx.overlay} onClick={onClose}>
      <div style={sx.sheet} onClick={(e) => e.stopPropagation()}>{children}</div>
    </div>
  );
}
function ModalPessoa({ onClose, onSave }) {
  const [nome, setNome] = useState(""); const [prazo, setPrazo] = useState(30);
  return (
    <Overlay onClose={onClose}>
      <h3 style={sx.modalTit}>Novo responsável</h3>
      <Campo label="Nome"><input autoFocus style={sx.input} value={nome} onChange={(e) => setNome(e.target.value)} placeholder="Ex: Tia Marta" /></Campo>
      <Campo label="Prazo para pagar (dias)"><input type="number" style={sx.input} value={prazo} onChange={(e) => setPrazo(+e.target.value)} /></Campo>
      <div style={sx.modalBtns}>
        <button style={sx.cancel} onClick={onClose}>Cancelar</button>
        <button style={sx.save} disabled={!nome.trim()} onClick={() => { onSave(nome.trim(), prazo); onClose(); }}>Salvar</button>
      </div>
    </Overlay>
  );
}
function ModalLancamento({ tipoInicial, pessoaIdFixo, pessoas, onClose, onSave, onAddPessoa }) {
  const [tipo, setTipo] = useState(tipoInicial);
  const [pessoaId, setPessoaId] = useState(pessoaIdFixo || pessoas[0]?.id || "");
  const [valor, setValor] = useState(""); const [desc, setDesc] = useState("");
  const [categoria, setCategoria] = useState(""); const [data, setData] = useState(hoje());
  const [parcelas, setParcelas] = useState(1); const [novoNome, setNovoNome] = useState("");
  const precisaPessoa = pessoas.length === 0 || pessoaId === "__novo";
  const valorNum = parseFloat((valor || "").replace(",", ".")) || 0;
  const valido = valorNum > 0 && (pessoaIdFixo || (precisaPessoa ? novoNome.trim() : pessoaId));
  const salvar = () => {
    let pid = pessoaIdFixo || pessoaId;
    if (precisaPessoa && novoNome.trim()) pid = onAddPessoa(novoNome.trim(), 30);
    onSave({ pessoaId: pid, tipo, categoria: categoria.trim(), desc: desc.trim(),
      valor: valorNum, data, parcelas: tipo === "compra" ? Math.max(1, parcelas) : 1 });
  };
  return (
    <Overlay onClose={onClose}>
      <h3 style={sx.modalTit}>Novo lançamento</h3>
      <div style={sx.seg}>
        {[["compra","Compra"],["fatura","Fatura do mês"],["pagamento","Pagamento"]].map(([k, l]) => (
          <button key={k} onClick={() => setTipo(k)} style={{ ...sx.segBtn, ...(tipo === k ? sx.segOn : {}) }}>{l}</button>
        ))}
      </div>
      {!pessoaIdFixo && (
        <Campo label="Responsável">
          {pessoas.length > 0 ? (
            <select style={sx.input} value={pessoaId} onChange={(e) => setPessoaId(e.target.value)}>
              {pessoas.map((p) => <option key={p.id} value={p.id}>{p.nome}</option>)}
              <option value="__novo">+ Novo responsável…</option>
            </select>
          ) : (
            <input style={sx.input} value={novoNome} onChange={(e) => setNovoNome(e.target.value)} placeholder="Nome do responsável" />
          )}
          {pessoaId === "__novo" && pessoas.length > 0 && (
            <input style={{ ...sx.input, marginTop: 8 }} value={novoNome} onChange={(e) => setNovoNome(e.target.value)} placeholder="Nome do novo responsável" />
          )}
        </Campo>
      )}
      <Campo label="Valor (R$)"><input autoFocus inputMode="decimal" style={sx.input} value={valor} onChange={(e) => setValor(e.target.value)} placeholder="0,00" /></Campo>
      {tipo !== "pagamento" && (
        <Campo label={tipo === "fatura" ? "Mês / descrição" : "Descrição"}>
          <input style={sx.input} value={desc} onChange={(e) => setDesc(e.target.value)} placeholder={tipo === "fatura" ? "Ex: Fatura de junho" : "Ex: Farmácia"} />
        </Campo>
      )}
      {tipo === "compra" && (
        <>
          <Campo label="Categoria (opcional)"><input style={sx.input} value={categoria} onChange={(e) => setCategoria(e.target.value)} placeholder="Ex: Mercado, Saúde…" /></Campo>
          <Campo label="Parcelas">
            <input type="number" min="1" style={sx.input} value={parcelas} onChange={(e) => setParcelas(+e.target.value)} />
            {parcelas > 1 && valorNum > 0 && <span style={sx.hint}>{parcelas}× de {BRL(valorNum / parcelas)} — uma por mês</span>}
          </Campo>
        </>
      )}
      <Campo label="Data"><input type="date" style={sx.input} value={data} onChange={(e) => setData(e.target.value)} /></Campo>
      <div style={sx.modalBtns}>
        <button style={sx.cancel} onClick={onClose}>Cancelar</button>
        <button style={sx.save} disabled={!valido} onClick={salvar}>Salvar</button>
      </div>
    </Overlay>
  );
}
function ModalConfirm({ texto, onClose, onConfirm }) {
  return (
    <Overlay onClose={onClose}>
      <h3 style={sx.modalTit}>Confirmar</h3>
      <p style={{ color: C.dim, fontSize: 14, lineHeight: 1.5, margin: "0 0 20px" }}>{texto}</p>
      <div style={sx.modalBtns}>
        <button style={sx.cancel} onClick={onClose}>Cancelar</button>
        <button style={{ ...sx.save, background: C.alert, color: "#fff" }} onClick={onConfirm}>Remover</button>
      </div>
    </Overlay>
  );
}
function ModalCobranca({ pessoa, saldo, lancamentos, dias, onClose }) {
  const [telefone, setTelefone] = useState(pessoa.telefone || "");
  const [copiado, setCopiado] = useState(false);
  const ultimoPag = lancamentos.filter((l) => l.tipo === "pagamento").sort((a, b) => b.data.localeCompare(a.data))[0]?.data || "0000-00-00";
  const comprasRecentes = lancamentos.filter((l) => l.tipo !== "pagamento" && l.data > ultimoPag).sort((a, b) => a.data.localeCompare(b.data));
  const linhasItens = comprasRecentes.length > 0
    ? comprasRecentes.map((l) => {
        const nome = l.desc || l.categoria || "Compra";
        const parc = l.parcelas > 1 ? ` (${l.parcela}/${l.parcelas})` : "";
        return `• ${fmtData(l.data)} — ${nome}${parc}: ${BRL(l.valor)}`;
      }).join("\n") : null;
  const saudacao = () => { const h = new Date().getHours(); return h < 12 ? "Bom dia" : h < 18 ? "Boa tarde" : "Boa noite"; };
  const msg =
`${saudacao()}, ${pessoa.nome}! 😊

Passando pra organizar o cartão. O valor em aberto até agora é de *${BRL(saldo)}*.` +
(linhasItens ? `\n\nReferente a:\n${linhasItens}` : "") +
(dias !== null ? `\n\n(Último acerto há ${dias} dias.)` : "") +
`\n\nQuando puder, me avisa pra acertarmos. Qualquer dúvida é só falar. Obrigado!`;
  const soDigitos = telefone.replace(/\D/g, "");
  const fone = soDigitos ? (soDigitos.startsWith("55") ? soDigitos : "55" + soDigitos) : "";
  const linkWhats = `https://wa.me/${fone}?text=${encodeURIComponent(msg)}`;
  const copiar = () => { navigator.clipboard?.writeText(msg).then(() => { setCopiado(true); setTimeout(() => setCopiado(false), 2000); }); };
  return (
    <Overlay onClose={onClose}>
      <h3 style={sx.modalTit}>Cobrança — {pessoa.nome}</h3>
      <Campo label="Telefone com DDD (opcional, abre o WhatsApp já no contato)">
        <input style={sx.input} value={telefone} onChange={(e) => setTelefone(e.target.value)} placeholder="Ex: 15 99999-9999" inputMode="tel" />
      </Campo>
      <div style={sx.previa}>{msg}</div>
      <div style={sx.modalBtns}>
        <button style={sx.cancel} onClick={copiar}>{copiado ? "Copiado ✓" : "Copiar texto"}</button>
        <a style={{ ...sx.save, textAlign: "center", textDecoration: "none", display: "block", lineHeight: "1.4" }}
          href={linkWhats} target="_blank" rel="noopener noreferrer" onClick={onClose}>Abrir no WhatsApp</a>
      </div>
      <p style={sx.zapNota}>Sem o telefone, o botão abre o WhatsApp para você escolher o contato. A mensagem já vai montada.</p>
    </Overlay>
  );
}
function Campo({ label, children }) {
  return <label style={sx.campo}><span style={sx.campoLabel}>{label}</span>{children}</label>;
}
