// Dada a data da compra e o cartão (dia fechamento + dia vencimento),
// calcula a data de vencimento da fatura em que a compra cai.
// Regra: comprou ATÉ o dia de fechamento -> fatura vence neste mês.

// Sem dia de fechamento definido, usa o próprio dia de vencimento como corte.
function calcularVencimento(dataCompra, cartao) {
  if (!cartao || !cartao.diaVenc) return null;

      anoVenc += 1;
