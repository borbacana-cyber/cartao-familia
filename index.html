});
const hoje = () => new Date().toISOString().slice(0, 10);
const mesAtual = () => new Date().toISOString().slice(0, 7);
const fmtData = d => d ? new Date(d + "T00:00:00").toLocaleDateString("pt-BR") : "";
const NOMES_MES = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];
const NOMES_MES_LONGO = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
const fmtMes = m => {
  if (!m) return "";
  const [a, mm] = m.split("-");
  return `${NOMES_MES[+mm - 1]}/${a}`;
};
const fmtMesLongo = m => {
  if (!m) return "";
  const [a, mm] = m.split("-");
  return `${NOMES_MES_LONGO[+mm - 1]} de ${a}`;
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

// ============ Ciclo de fatura ============
// Dada a data da compra e o cartão (dia fechamento + dia vencimento),
// calcula a data de vencimento da fatura em que a compra cai.
//
// Modelo: cada fatura tem uma data de fechamento (corte) e uma data de
// vencimento que vem DEPOIS do fechamento. Uma compra pertence à primeira
// fatura cujo fechamento é >= data da compra.
//   - Comprou até o fechamento do mês corrente -> fecha nesse mês.
//   - Comprou depois -> fecha no mês seguinte.
// O vencimento é o diaVenc aplicado ao mês do fechamento; se diaVenc <= diaFech,
// o vencimento cai no mês seguinte ao fechamento (padrão da maioria dos cartões).
// Sem diaFech definido, o próprio diaVenc é usado como corte.
function addMeses(ano, mes /*1-12*/, delta) {
  let m = mes - 1 + delta;
  const a = ano + Math.floor(m / 12);
  m = (m % 12 + 12) % 12;
  return {
    ano: a,
    mes: m + 1
  };
}
function montarData(ano, mes /*1-12*/, dia) {
  const ultimoDia = new Date(ano, mes, 0).getDate();
  const d = Math.min(dia, ultimoDia);
  return `${ano}-${String(mes).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}
function calcularVencimento(dataCompra, cartao) {
  if (!cartao || !cartao.diaVenc) return null;
  const [ano, mes, dia] = dataCompra.split("-").map(Number);
  const temFech = !!cartao.diaFech;
  const corte = temFech ? cartao.diaFech : cartao.diaVenc;

  // 1) Mês em que a fatura FECHA
  let fAno = ano,
    fMes = mes;
  if (dia > corte) {
    // passou o corte -> fecha mês seguinte
    ({
      ano: fAno,
      mes: fMes
    } = addMeses(ano, mes, 1));
  }

  // 2) Mês em que a fatura VENCE (após o fechamento)
  let vAno = fAno,
    vMes = fMes;
  if (temFech && cartao.diaVenc <= cartao.diaFech) {
    // vencimento no mês seguinte ao fechamento
    ({
      ano: vAno,
      mes: vMes
    } = addMeses(fAno, fMes, 1));
  }
  return montarData(vAno, vMes, cartao.diaVenc);
}

// ============ Camada Firestore ============
function useFirestore() {
  const [pronto, setPronto] = useState(!!window.__fb);
  const [pessoas, setPessoas] = useState([]);
  const [lancamentos, setLancamentos] = useState([]);
  const [cartoes, setCartoes] = useState([]);
  const [categorias, setCategorias] = useState([]);
  const [auditoria, setAuditoria] = useState([]);
  const [erro, setErro] = useState(null);
  const [online, setOnline] = useState(false);
  useEffect(() => {
    if (window.__fb) {
      setPronto(true);
      return;
    }
    const h = () => setPronto(true);
    window.addEventListener("fb-ready", h);
    return () => window.removeEventListener("fb-ready", h);
  }, []);
  useEffect(() => {
    if (!pronto) return;
    const fb = window.__fb;
    try {
      const un1 = fb.onSnapshot(fb.collection(fb.db, fb.COL_PESSOAS), snap => {
        setPessoas(snap.docs.map(d => d.data()));
        setOnline(true);
      }, e => setErro(e.message));
      const un2 = fb.onSnapshot(fb.collection(fb.db, fb.COL_LANC), snap => {
        setLancamentos(snap.docs.map(d => d.data()));
        setOnline(true);
      }, e => setErro(e.message));
      const un3 = fb.onSnapshot(fb.collection(fb.db, fb.COL_CARTOES), snap => {
        setCartoes(snap.docs.map(d => d.data()));
        setOnline(true);
      }, e => setErro(e.message));
      const un4 = fb.COL_AUDIT ? fb.onSnapshot(fb.collection(fb.db, fb.COL_AUDIT), snap => setAuditoria(snap.docs.map(d => d.data())), () => {}) : () => {};
      const un5 = fb.COL_CATEG ? fb.onSnapshot(fb.collection(fb.db, fb.COL_CATEG), snap => setCategorias(snap.docs.map(d => d.data())), () => {}) : () => {};
      return () => {
        un1();
        un2();
        un3();
        un4();
        un5();
      };
    } catch (e) {
      setErro(e.message);
    }
  }, [pronto]);

  // Registra evento de auditoria (append-only). Nunca sobrescreve nem apaga.
  const auditar = async evento => {
    try {
      const f = window.__fb;
      if (!f.COL_AUDIT) return;
      const id = uid();
      const reg = {
        id,
        ts: new Date().toISOString(),
        acao: evento.acao || "",
        entidade: evento.entidade || "",
        descricao: evento.descricao || "",
        valorAntes: evento.valorAntes == null ? null : evento.valorAntes,
        valorDepois: evento.valorDepois == null ? null : evento.valorDepois,
        detalhe: evento.detalhe || ""
      };
      await f.setDoc(f.doc(f.db, f.COL_AUDIT, id), reg);
    } catch (e) {/* auditoria não deve quebrar a operação principal */}
  };
  const api = useMemo(() => {
    const fb = () => window.__fb;
    return {
      salvarPessoa: p => fb().setDoc(fb().doc(fb().db, fb().COL_PESSOAS, p.id), p),
      removerPessoa: async id => {
        const f = fb();
        await f.deleteDoc(f.doc(f.db, f.COL_PESSOAS, id));
        const lancs = (window.__lancRef || []).filter(l => l.pessoaId === id);
        const batch = f.writeBatch(f.db);
        lancs.forEach(l => batch.delete(f.doc(f.db, f.COL_LANC, l.id)));
        await batch.commit();
      },
      salvarLanc: l => fb().setDoc(fb().doc(fb().db, fb().COL_LANC, l.id), l),
      salvarLancs: async arr => {
        const f = fb();
        const batch = f.writeBatch(f.db);
        arr.forEach(l => batch.set(f.doc(f.db, f.COL_LANC, l.id), l));
        await batch.commit();
      },
      removerLanc: id => fb().deleteDoc(fb().doc(fb().db, fb().COL_LANC, id)),
      salvarCartao: c => fb().setDoc(fb().doc(fb().db, fb().COL_CARTOES, c.id), c),
      removerCartao: id => fb().deleteDoc(fb().doc(fb().db, fb().COL_CARTOES, id)),
      salvarCategoria: c => fb().setDoc(fb().doc(fb().db, fb().COL_CATEG, c.id), c),
      removerCategoria: id => fb().deleteDoc(fb().doc(fb().db, fb().COL_CATEG, id)),
      auditar
    };
  }, []);
  useEffect(() => {
    window.__lancRef = lancamentos;
  }, [lancamentos]);
  return {
    pronto,
    online,
    pessoas,
    lancamentos,
    cartoes,
    categorias,
    auditoria,
    erro,
    api
  };
}

// ============ App ============
function App() {
  const {
    pronto,
    online,
    pessoas,
    lancamentos,
    cartoes,
    categorias,
    auditoria,
    erro,
    api
  } = useFirestore();
  const [aba, setAba] = useState("resumo");
  const [pessoaSel, setPessoaSel] = useState(null);
  const [modal, setModal] = useState(null);
  const [mesFiltro, setMesFiltro] = useState("todos");
  // Filtros do Resumo
  const [fPeriodoIni, setFPeriodoIni] = useState("");
  const [fPeriodoFim, setFPeriodoFim] = useState("");
  const [fCartoes, setFCartoes] = useState([]); // ids de cartões (múltiplo)
  const [fDevedor, setFDevedor] = useState("todos");
  const [fVencIni, setFVencIni] = useState("");
  const [fVencFim, setFVencFim] = useState("");
  const [fStatus, setFStatus] = useState("aberto"); // aberto | quitado | todos
  const [filtrosAbertos, setFiltrosAbertos] = useState(false);
  const [filtroAplicado, setFiltroAplicado] = useState(false);
  const [toast, setToast] = useState(null);
  const mostrarToast = txt => {
    setToast(txt);
    setTimeout(() => setToast(null), 2000);
  };
  const cartaoPorId = id => cartoes.find(c => c.id === id) || null;

  // Pagamentos podem estar vinculados a um item (itemId) ou serem gerais (legado).
  const pagoDoItem = itemId => lancamentos.filter(l => l.tipo === "pagamento" && l.itemId === itemId).reduce((s, l) => s + l.valor, 0);
  const restanteDoItem = l => Math.max(0, (l.valor || 0) - pagoDoItem(l.id));
  const itemQuitado = l => l.tipo !== "pagamento" && restanteDoItem(l) <= 0.005;
  const saldoDe = pid => {
    // saldo = soma dos restantes das cobranças - pagamentos gerais (sem itemId)
    const cobrancas = lancamentos.filter(l => l.pessoaId === pid && l.tipo !== "pagamento");
    const restante = cobrancas.reduce((s, l) => s + restanteDoItem(l), 0);
    const pagGerais = lancamentos.filter(l => l.pessoaId === pid && l.tipo === "pagamento" && !l.itemId).reduce((s, l) => s + l.valor, 0);
    return restante - pagGerais;
  };
  const ultimoPagamento = pid => {
    const ps = lancamentos.filter(l => l.pessoaId === pid && l.tipo === "pagamento").sort((a, b) => b.data.localeCompare(a.data));
    return ps[0]?.data || null;
  };
  const diasSemPagar = pid => {
    if (saldoDe(pid) <= 0.005) return null;
    const up = ultimoPagamento(pid);
    const primeira = lancamentos.filter(l => l.pessoaId === pid && l.tipo !== "pagamento").sort((a, b) => a.data.localeCompare(b.data))[0]?.data;
    const ref = up || primeira;
    if (!ref) return null;
    return Math.floor((Date.now() - new Date(ref + "T00:00:00")) / 86400000);
  };
  // Atrasado se tem item NÃO quitado com vencimento já passado.
  const estaAtrasado = p => {
    if (saldoDe(p.id) <= 0.005) return false;
    const hojeStr = hoje();
    const temVencido = lancamentos.some(l => l.pessoaId === p.id && l.tipo !== "pagamento" && l.vencimento && l.vencimento < hojeStr && !itemQuitado(l));
    if (temVencido) return true;
    const d = diasSemPagar(p.id);
    return d !== null && d > (p.prazo || 30);
  };
  const mesesDisponiveis = useMemo(() => {
    const set = new Set(lancamentos.map(l => l.mes));
    return [...set].sort((a, b) => b.localeCompare(a));
  }, [lancamentos]);
  const categoriasUsadas = useMemo(() => {
    const norm = s => (s || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const nomes = new Map(); // chave normalizada -> nome exibido
    categorias.forEach(c => {
      const k = norm(c.nome);
      if (c.nome && !nomes.has(k)) nomes.set(k, c.nome.trim());
    });
    lancamentos.forEach(l => {
      const n = (l.categoria || "").trim();
      const k = norm(n);
      if (n && !nomes.has(k)) nomes.set(k, n);
    });
    return [...nomes.values()].sort((a, b) => a.localeCompare(b));
  }, [lancamentos, categorias]);
  const totais = useMemo(() => {
    const devido = pessoas.reduce((s, p) => s + Math.max(0, saldoDe(p.id)), 0);
    const ehMes = l => mesFiltro === "todos" ? l.mes === mesAtual() : l.mes === mesFiltro;
    const recebido = lancamentos.filter(l => l.tipo === "pagamento" && ehMes(l)).reduce((s, l) => s + l.valor, 0);
    const gasto = lancamentos.filter(l => l.tipo !== "pagamento" && ehMes(l)).reduce((s, l) => s + l.valor, 0);
    const atrasados = pessoas.filter(p => estaAtrasado(p)).length;
    // dashboard geral por vencimento (soma restante de todos os itens em aberto)
    const hojeStr = hoje();
    let vencido = 0,
      venceHoje = 0,
      aVencer = 0;
    lancamentos.filter(l => l.tipo !== "pagamento" && !itemQuitado(l)).forEach(l => {
      const r = restanteDoItem(l);
      const v = l.vencimento || l.data;
      if (v < hojeStr) vencido += r;else if (v === hojeStr) venceHoje += r;else aVencer += r;
    });
    return {
      devido,
      recebido,
      gasto,
      atrasados,
      vencido,
      venceHoje,
      aVencer
    };
  }, [pessoas, lancamentos, mesFiltro]);
  const rotuloMes = mesFiltro === "todos" ? fmtMes(mesAtual()) : fmtMes(mesFiltro);

  // Ações
  const addPessoa = (nome, prazo) => {
    const id = uid();
    api.salvarPessoa({
      id,
      nome,
      prazo: prazo || 30
    });
    return id;
  };
  const removerPessoa = id => {
    const p = pessoas.find(x => x.id === id);
    const qtdLancs = lancamentos.filter(l => l.pessoaId === id).length;
    if (p) api.auditar({
      acao: "exclusao",
      entidade: "responsavel",
      descricao: p.nome,
      valorAntes: saldoDe(id),
      valorDepois: null,
      detalhe: `${qtdLancs} lançamento(s) apagados junto`
    });
    api.removerPessoa(id);
    if (pessoaSel === id) {
      setPessoaSel(null);
      setAba("resumo");
    }
  };
  // Modelo unificado de lançamento.
  // dados: { editId?, forma, pessoaId?, fatias?[{pessoaId,valor}], valor?, desc, categoria,
  //          data, parcelas, cartaoId?, vencManual? }
  // forma: "cartao" | "pix" | "dinheiro" | "boleto"
  const gerarLinhasLancamento = dados => {
    const cartao = dados.forma === "cartao" && dados.cartaoId ? cartaoPorId(dados.cartaoId) : null;
    const vencDe = (dataStr, primeira) => {
      if (dados.vencOverride && primeira) return dados.vencOverride;
      if (dados.forma === "cartao" && cartao) return calcularVencimento(dataStr, cartao);
      return dados.vencManual || dataStr;
    };
    const alvos = dados.fatias && dados.fatias.length ? dados.fatias.filter(f => f.pessoaId && f.valor > 0) : [{
      pessoaId: dados.pessoaId,
      valor: dados.valor
    }];
    // Repetição: valor cheio N vezes, avançando por intervalo. Colide com parcelas → se repetir, parcelas=1.
    const repetir = Math.max(1, dados.repetir || 1);
    const intervalo = dados.intervalo || "mensal"; // mensal | quinzenal | semanal
    const parcelas = repetir > 1 ? 1 : Math.max(1, dados.parcelas || 1);
    const avancar = (dt, n) => {
      const d = new Date(dt);
      if (repetir > 1) {
        if (intervalo === "semanal") d.setDate(d.getDate() + 7 * n);else if (intervalo === "quinzenal") d.setDate(d.getDate() + 14 * n);else d.setMonth(d.getMonth() + n);
      } else {
        d.setMonth(d.getMonth() + n); // parcelas: sempre mensal
      }
      return d;
    };
    const grupo = alvos.length > 1 || parcelas > 1 || repetir > 1 ? uid() : null;
    const linhas = [];
    alvos.forEach(alvo => {
      const ocorrencias = repetir > 1 ? repetir : parcelas;
      const valorCada = repetir > 1 ? alvo.valor : +(alvo.valor / parcelas).toFixed(2);
      const base = new Date(dados.data + "T00:00:00");
      for (let i = 0; i < ocorrencias; i++) {
        const d = avancar(base, i);
        const ds = d.toISOString().slice(0, 10);
        const venc = vencDe(ds, i === 0);
        linhas.push({
          id: uid(),
          pessoaId: alvo.pessoaId,
          tipo: "compra",
          forma: dados.forma,
          categoria: dados.categoria || "",
          desc: dados.desc || "",
          valor: valorCada,
          data: dados.forma === "cartao" || repetir > 1 ? ds : dados.data,
          mes: (dados.forma === "cartao" || repetir > 1 ? ds : dados.data).slice(0, 7),
          parcela: repetir > 1 ? 1 : i + 1,
          parcelas: repetir > 1 ? 1 : parcelas,
          repeticao: repetir > 1 ? i + 1 : null,
          repeticoes: repetir > 1 ? repetir : null,
          cartaoId: dados.forma === "cartao" ? dados.cartaoId || null : null,
          vencimento: venc,
          mesFatura: venc ? venc.slice(0, 7) : ds.slice(0, 7),
          grupo,
          nota: dados.nota || "",
          vencOverride: (i === 0 ? dados.vencOverride : null) || null
        });
      }
    });
    return linhas;
  };
  const addLancamento = dados => {
    if (dados.tipo === "pagamento") {
      const base = {
        id: dados.editId || uid(),
        pessoaId: dados.pessoaId,
        tipo: "pagamento",
        categoria: dados.categoria || "",
        desc: dados.desc || "",
        valor: dados.valor,
        data: dados.data,
        mes: dados.data.slice(0, 7),
        parcela: 1,
        parcelas: 1,
        cartaoId: null,
        vencimento: null,
        mesFatura: dados.data.slice(0, 7),
        itemId: dados.itemId || null,
        nota: dados.nota || ""
      };
      api.salvarLanc(base);
      setModal(null);
      mostrarToast("Pagamento registrado ✓");
      return;
    }
    if (dados.editId) {
      const anterior = lancamentos.find(l => l.id === dados.editId);
      const cartao = dados.forma === "cartao" && dados.cartaoId ? cartaoPorId(dados.cartaoId) : null;
      const venc = dados.vencOverride ? dados.vencOverride : dados.forma === "cartao" && cartao ? calcularVencimento(dados.data, cartao) : dados.vencManual || dados.data;
      api.salvarLanc({
        id: dados.editId,
        pessoaId: dados.pessoaId,
        tipo: "compra",
        forma: dados.forma,
        categoria: dados.categoria || "",
        desc: dados.desc || "",
        valor: dados.valor,
        data: dados.data,
